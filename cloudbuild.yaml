steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"

substitutions:
  _SERVICE_NAME: aliss-labs-site
  _REGION: asia-northeast1
  _IMAGE: asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/aliss-labs-site:$COMMIT_SHA

images:
  - ${_IMAGE}
